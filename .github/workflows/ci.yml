name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/matter-workspace/validators/requirements.txt

      - name: Install Matter Workspace validation dependencies
        run: >-
          python -m pip install --disable-pip-version-check --no-input
          -r core/matter-workspace/validators/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JSON sanity
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null

      - name: China localization and Matter Workspace regression
        run: python3 scripts/localization-regression.py

      - name: Legal-data smoke test
        run: bash scripts/test-legal-data.sh

      - name: Managed-agent cookbook smoke test
        run: bash scripts/test-cookbooks.sh
