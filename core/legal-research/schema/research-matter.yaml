# JSON Schema Draft 2020-12 expressed as YAML.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.claude-for-legal-cn.invalid/legal-research/v1/research-matter.yaml
title: Legal Research Matter
description: >-
  A structured research instruction linked to one Matter Workspace Issue.
  It defines workflow state and source requirements without retrieving data.
type: object
additionalProperties: false
required:
  - version
  - id
  - matter_slug
  - issue_ref
  - legal_question
  - jurisdiction
  - source_requirements
  - status
  - owner
  - open_questions
  - human_review
  - created_at
  - updated_at
properties:
  version:
    type: integer
    const: 1
  id:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  matter_slug:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/slug
  issue_ref:
    description: An existing Issue ID in the referenced Matter Workspace.
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  legal_question:
    type: string
    minLength: 1
    maxLength: 4000
  jurisdiction:
    $ref: '#/$defs/jurisdiction'
  source_requirements:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: https://schemas.claude-for-legal-cn.invalid/legal-research/v1/research-source.yaml#/$defs/source_requirement
  status:
    type: string
    enum:
      - issue_identified
      - question_framed
      - collecting_sources
      - extracting_rules
      - analyzing_cases
      - drafting_position
      - awaiting_human_review
      - approved
      - closed
  owner:
    oneOf:
      - type: string
        minLength: 1
        maxLength: 120
      - type: 'null'
  open_questions:
    type: array
    items:
      type: string
      minLength: 1
      maxLength: 1000
  human_review:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/human_review
  created_at:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/date_time
  updated_at:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/date_time
$defs:
  jurisdiction:
    type: object
    additionalProperties: false
    required:
      - country
      - legal_system
      - region
      - court_level
    properties:
      country:
        type: string
        const: CN
      legal_system:
        type: string
        const: PRC
      region:
        type: string
        minLength: 1
        maxLength: 200
      court_level:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 100
          - type: 'null'
