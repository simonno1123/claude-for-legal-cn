# JSON Schema Draft 2020-12 expressed as YAML.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/strategy.yaml
title: Matter Workspace Strategy
description: >-
  A human-reviewed strategy record containing alternatives, risks, assumptions
  and selected direction. It does not authorize autonomous legal action.
type: object
additionalProperties: false
required:
  - version
  - id
  - matter_slug
  - title
  - status
  - objective
  - issue_refs
  - claim_refs
  - options
  - selected_option_id
  - risk_assessment
  - assumptions
  - human_review
  - created_at
  - updated_at
properties:
  version:
    type: integer
    const: 1
  id:
    $ref: matter.yaml#/$defs/entity_id
  matter_slug:
    $ref: matter.yaml#/$defs/slug
  title:
    type: string
    minLength: 1
    maxLength: 300
  status:
    type: string
    enum:
      - draft
      - pending_review
      - approved
      - rejected
      - superseded
  objective:
    type: string
    minLength: 1
    maxLength: 5000
  issue_refs:
    $ref: matter.yaml#/$defs/reference_list
  claim_refs:
    $ref: matter.yaml#/$defs/reference_list
  options:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/option'
  selected_option_id:
    oneOf:
      - $ref: matter.yaml#/$defs/entity_id
      - type: 'null'
  risk_assessment:
    type: array
    items:
      $ref: '#/$defs/risk'
  assumptions:
    type: array
    items:
      type: string
      minLength: 1
      maxLength: 2000
  output_refs:
    type: array
    uniqueItems: true
    items:
      $ref: matter.yaml#/$defs/local_path
  human_review:
    $ref: matter.yaml#/$defs/human_review
  module_fields:
    type: object
  created_at:
    $ref: matter.yaml#/$defs/date_time
  updated_at:
    $ref: matter.yaml#/$defs/date_time
$defs:
  option:
    type: object
    additionalProperties: false
    required:
      - id
      - title
      - description
      - actions
      - benefits
      - risks
      - dependencies
    properties:
      id:
        $ref: matter.yaml#/$defs/entity_id
      title:
        type: string
        minLength: 1
        maxLength: 300
      description:
        type: string
        minLength: 1
        maxLength: 5000
      actions:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 1000
      benefits:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 1000
      risks:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 1000
      dependencies:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 1000
      estimated_timeline:
        oneOf:
          - type: string
            maxLength: 500
          - type: 'null'
  risk:
    type: object
    additionalProperties: false
    required:
      - category
      - level
      - description
      - mitigation
    properties:
      category:
        type: string
        minLength: 1
        maxLength: 120
      level:
        type: string
        enum:
          - low
          - medium
          - high
          - critical
      description:
        type: string
        minLength: 1
        maxLength: 2000
      mitigation:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
allOf:
  - if:
      properties:
        status:
          const: approved
      required:
        - status
    then:
      properties:
        human_review:
          allOf:
            - $ref: matter.yaml#/$defs/human_review
            - properties:
                status:
                  const: approved
                reviewer:
                  type: string
                  minLength: 1
                  maxLength: 120
                reviewed_at:
                  $ref: matter.yaml#/$defs/date_time
              required:
                - status
                - reviewer
                - reviewed_at
