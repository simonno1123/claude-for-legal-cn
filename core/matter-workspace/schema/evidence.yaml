# JSON Schema Draft 2020-12 expressed as YAML.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/evidence.yaml
title: Matter Workspace Evidence
description: >-
  An evidence record for China-law matter analysis. Authenticity, relevance,
  admissibility and acquisition lawfulness remain separate review dimensions.
type: object
additionalProperties: false
required:
  - version
  - id
  - matter_slug
  - title
  - evidence_type
  - status
  - source
  - acquisition
  - authenticity
  - relevance
  - admissibility
  - chain_of_custody
  - file_refs
  - fact_refs
  - issue_refs
  - confidentiality
  - created_at
  - updated_at
properties:
  version:
    type: integer
    const: 1
  id:
    $ref: matter.yaml#/$defs/entity_id
  matter_slug:
    $ref: matter.yaml#/$defs/slug
  title:
    type: string
    minLength: 1
    maxLength: 300
  metadata:
    type: object
    additionalProperties: false
    properties:
      external_id:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 200
          - type: 'null'
      description:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
      document_date:
        oneOf:
          - type: string
            format: date
          - type: 'null'
      language:
        oneOf:
          - type: string
            minLength: 2
            maxLength: 35
          - type: 'null'
      tags:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
          maxLength: 100
  evidence_type:
    description: Legal-form evidence type used by the existing Matter model.
    type: string
    enum:
      - document
      - electronic_data
      - audio_visual
      - witness_statement
      - expert_opinion
      - inspection_record
      - party_statement
      - physical_evidence
      - other
  classification:
    description: Business classification used for Evidence intake and routing.
    type: string
    enum:
      - contract
      - payment
      - communication
      - corporate
      - court_document
      - property
      - identity
      - other
  status:
    description: >-
      Evidence lifecycle status. Existing v1 values remain valid for backward
      compatibility; the additional values support the Evidence Workflow.
    type: string
    enum:
      - pending_collection
      - collected
      - under_review
      - verified
      - challenged
      - excluded
      - received
      - reviewing
      - disputed
      - archived
  source:
    $ref: '#/$defs/source'
  acquisition:
    $ref: '#/$defs/acquisition'
  authenticity:
    $ref: '#/$defs/authenticity'
  relevance:
    $ref: '#/$defs/legal_dimension'
  admissibility:
    $ref: '#/$defs/legal_dimension'
  chain_of_custody:
    type: array
    items:
      $ref: '#/$defs/custody_event'
  file_refs:
    type: array
    uniqueItems: true
    items:
      $ref: matter.yaml#/$defs/local_path
  fact_refs:
    description: Fact IDs associated with this Evidence record.
    $ref: matter.yaml#/$defs/reference_list
  issue_refs:
    description: Issue IDs associated with this Evidence record.
    $ref: matter.yaml#/$defs/reference_list
  fact_relationships:
    description: Optional typed relationships to Fact records.
    type: array
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required:
        - target_id
        - relation_type
        - note
      properties:
        target_id:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{0,95}$'
        relation_type:
          type: string
          enum:
            - supports
            - contradicts
            - contextualizes
            - authenticates
            - challenges
            - relates_to
        note:
          oneOf:
            - type: string
              maxLength: 2000
            - type: 'null'
  issue_relationships:
    description: Optional typed relationships to Issue records.
    type: array
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required:
        - target_id
        - relation_type
        - note
      properties:
        target_id:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{0,95}$'
        relation_type:
          type: string
          enum:
            - supports
            - contradicts
            - contextualizes
            - authenticates
            - challenges
            - relates_to
        note:
          oneOf:
            - type: string
              maxLength: 2000
            - type: 'null'
  confidentiality:
    $ref: matter.yaml#/$defs/confidentiality
  original_held_by:
    oneOf:
      - $ref: matter.yaml#/$defs/entity_id
      - type: 'null'
  review_note:
    oneOf:
      - type: string
        maxLength: 5000
      - type: 'null'
  human_review:
    description: Mandatory human approval gate when this field is present.
    type: object
    additionalProperties: false
    required:
      - required
      - status
      - reviewer
      - reviewed_at
      - note
    properties:
      required:
        type: boolean
        const: true
      status:
        type: string
        enum:
          - pending
          - approved
          - rejected
      reviewer:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 120
          - type: 'null'
      reviewed_at:
        oneOf:
          - type: string
            format: date-time
          - type: 'null'
      note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
  module_fields:
    type: object
  created_at:
    $ref: matter.yaml#/$defs/date_time
  updated_at:
    $ref: matter.yaml#/$defs/date_time
$defs:
  source:
    type: object
    additionalProperties: false
    required:
      - description
      - holder_party_id
      - source_ref
    properties:
      description:
        type: string
        minLength: 1
        maxLength: 1000
      holder_party_id:
        oneOf:
          - $ref: matter.yaml#/$defs/entity_id
          - type: 'null'
      source_ref:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 500
          - type: 'null'
      origin:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 500
          - type: 'null'
      provider_party_id:
        oneOf:
          - type: string
            pattern: '^[a-z0-9][a-z0-9-]{0,95}$'
          - type: 'null'
      provider_name:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 300
          - type: 'null'
      reliability:
        description: >-
          Human-recorded source reliability information, not an automated
          finding.
        type: object
        additionalProperties: false
        required:
          - status
          - reviewed_by
          - reviewed_at
          - note
        properties:
          status:
            type: string
            enum:
              - unassessed
              - corroborated
              - partially_corroborated
              - disputed
              - unreliable
          reviewed_by:
            oneOf:
              - type: string
                minLength: 1
                maxLength: 120
              - type: 'null'
          reviewed_at:
            oneOf:
              - type: string
                format: date-time
              - type: 'null'
          note:
            oneOf:
              - type: string
                maxLength: 2000
              - type: 'null'
  acquisition:
    type: object
    additionalProperties: false
    required:
      - method
      - lawfulness
      - obtained_at
    properties:
      method:
        type: string
        minLength: 1
        maxLength: 500
      lawfulness:
        type: string
        enum:
          - to_assess
          - lawful
          - challenged
          - unlawful
      obtained_at:
        oneOf:
          - $ref: matter.yaml#/$defs/date_time
          - type: 'null'
      note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
  authenticity:
    type: object
    additionalProperties: false
    required:
      - status
      - original_status
      - note
    properties:
      status:
        type: string
        enum:
          - to_assess
          - supported
          - challenged
          - not_supported
      original_status:
        type: string
        enum:
          - original
          - copy
          - electronic_original
          - unknown
      note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
  legal_dimension:
    type: object
    additionalProperties: false
    required:
      - status
      - note
    properties:
      status:
        type: string
        enum:
          - to_assess
          - supported
          - challenged
          - not_supported
      note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
  custody_event:
    type: object
    additionalProperties: false
    required:
      - event_id
      - occurred_at
      - actor
      - action
    properties:
      event_id:
        $ref: matter.yaml#/$defs/entity_id
      occurred_at:
        $ref: matter.yaml#/$defs/date_time
      actor:
        type: string
        minLength: 1
        maxLength: 200
      action:
        type: string
        minLength: 1
        maxLength: 200
      location:
        oneOf:
          - type: string
            maxLength: 500
          - type: 'null'
      note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
