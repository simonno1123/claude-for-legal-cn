# JSON Schema Draft 2020-12 expressed as YAML.
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.claude-for-legal-cn.invalid/legal-drafting/v1/source-trace.yaml
title: Legal Draft Source Trace
description: >-
  A human-reviewable provenance chain from a Draft to Strategy, Research,
  Issue, Evidence and Fact records. It does not validate legal truth.
type: object
additionalProperties: false
required:
  - version
  - id
  - draft_id
  - matter_slug
  - strategy_ref
  - research_output_ref
  - issue_ref
  - evidence_refs
  - fact_refs
  - evidence_fact_links
  - review_status
  - human_review
  - created_at
  - updated_at
properties:
  version:
    type: integer
    const: 1
  id:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  draft_id:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  matter_slug:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/slug
  strategy_ref:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  research_output_ref:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  issue_ref:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  evidence_refs:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  fact_refs:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
  evidence_fact_links:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/evidence_fact_link'
  review_status:
    type: string
    enum:
      - pending
      - approved
      - rejected
  human_review:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/human_review
  created_at:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/date_time
  updated_at:
    $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/date_time
$defs:
  evidence_fact_link:
    type: object
    additionalProperties: false
    required:
      - evidence_ref
      - fact_refs
      - issue_refs
      - use_note
    properties:
      evidence_ref:
        $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
      fact_refs:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
      issue_refs:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: https://schemas.claude-for-legal-cn.invalid/matter-workspace/v1/matter.yaml#/$defs/entity_id
      use_note:
        oneOf:
          - type: string
            maxLength: 2000
          - type: 'null'
