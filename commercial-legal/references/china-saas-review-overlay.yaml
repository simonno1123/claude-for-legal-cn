saas_overlay:
  data_roles:
    - 个人信息处理者
    - 受托处理者
    - 共同处理者
    - 独立处理者
  mandatory_checks:
    - 客户数据定义和所有权
    - 个人信息处理目的、范围、期限和安全措施
    - 子处理者/分包/第三方模型
    - 数据出境和境外远程访问
    - 日志、使用数据和 AI 训练授权
    - SLA、服务补偿和排他救济
    - 停服、降级、维护窗口和通知
    - 数据导出、迁移、删除证明
  evidence:
    - 等保
    - ISO 27001
    - 渗透测试或安全报告
    - 数据处理协议
    - 删除证明

