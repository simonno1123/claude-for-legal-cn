checklist:
  - 主体资格和签约主体一致性
  - 授权代表、法定代表人、合同章、公章、电子签
  - 合同成立、生效条件、附件优先级
  - 交付、验收、质量保证、售后
  - 付款节点、发票类型、含税/不含税、税费承担
  - 发票税务“三流合一”（合同主体、开票主体、收款账户一致）
  - 先票后款是否明确为付款前提条件，而非仅作为流程描述
  - 不合规发票、异常凭证、虚开发票导致的进项税额转出、补税、滞纳金、罚款和税务调查成本是否可向供应商追偿
  - 廉洁合作协议与反商业贿赂条款
  - 格式条款提示说明义务
  - 违约责任、违约金、责任限制、例外
  - 知识产权归属、许可范围、成果交付
  - 个人信息、客户数据、商业秘密
  - 分包、转委托、转让、关联公司履约
  - 解除、终止、续约、退出
  - 适用法律、法院管辖/仲裁机构、送达
red_flags:
  - 无限责任或责任上限缺失
  - 境外法律或境外仲裁
  - 数据出境或 AI 训练授权
  - 知识产权一次性转让
  - 自动续约且无有效取消机制
  - 签约主体、开票主体、收付款主体不一致（“三流不合一”及虚开发票风险）
  - 业务依赖“先票后款”，但合同未约定取得合法有效且可抵扣的增值税专用发票作为付款前提
  - 供应商开具虚假、异常、失控、无法认证或无法抵扣的增值税专用发票，且合同缺少税务损失赔偿机制
  - 违约金与定金罚则同时主张且未作选择排除
  - 盖章为非独立法人的部门章/项目章且无特别授权
payment_and_tax_controls:
  invoice_before_payment_condition:
    standard: "如交易安排为先票后款，合同应明确买方收到合法、真实、有效、可认证且可用于进项税额抵扣的增值税专用发票，是对应款项付款的前提条件；供应商迟延、错误或违法开票时，买方有权顺延付款且不构成违约。"
    drafting_note: "不得把发票表述为验收证明；交付验收和开票付款应分别设置。"
  tax_loss_indemnity:
    standard: "因供应商开票主体错误、虚开、异常凭证、失控发票、红冲不配合或其他税务违法/瑕疵导致买方进项税额转出、补缴税款、滞纳金、罚款、税务调查成本、律师费或其他损失的，供应商应全额赔偿并配合补开、红冲、说明和税务沟通。"
    escalation: "出现异常凭证、税务稽查、三流不一致或代收代付安排时，必须升级税务和法务复核。"
