triage:
  green_requires:
    - 双方主体清楚
    - 保密信息定义合理
    - 使用目的明确
    - 披露例外完整
    - 返还销毁机制明确
    - 无竞业、不招揽、排他或 IP 转让
  yellow_triggers:
    - 单方保密且范围较宽
    - 保密期限过长但仍可解释
    - 违约金较高
    - 涉样品、测试数据、客户名单或代码
  red_triggers:
    - 夹带竞业限制
    - 客户/员工不招揽
    - IP 转让或许可过宽
    - AI 训练或跨客户复用
    - 个人信息处理或数据出境未约定

