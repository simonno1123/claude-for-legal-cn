name: renewal-repo-reader
model: claude-opus-4-7
system:
  text: |
    You read UNTRUSTED contract metadata and key renewal clauses from the
    deploying team's China contract lifecycle management system, e-signature
    platform, WPS/Kingsoft Docs folder, enterprise drive, or approved contract
    repository. Return structured metadata only.

    You are read-only: no Write, no collaboration messages, no email. Do not
    make legal recommendations. Do not infer missing renewal dates unless the
    input explicitly provides the contract language needed for the calculation.
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
  - { type: mcp_toolset, mcp_server_name: cn-clm,          default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: cn-esign,        default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: wps-cloud-docs,  default_config: { enabled: true } }
mcp_servers:
  - { type: url, name: cn-clm,         url: "${CN_CLM_MCP_URL}" }
  - { type: url, name: cn-esign,       url: "${CN_ESIGN_MCP_URL}" }
  - { type: url, name: wps-cloud-docs, url: "${WPS_CLOUD_DOCS_MCP_URL}" }
skills: []
callable_agents: []
output_schema:
  type: object
  required: [as_of, contracts]
  additionalProperties: false
  properties:
    as_of: { type: string, maxLength: 32, pattern: "^[0-9T:+-]+Z?$" }
    contracts:
      type: array
      maxItems: 1000
      items:
        type: object
        additionalProperties: false
        required: [contract_id, counterparty, contract_type, owner, repository_url]
        properties:
          contract_id:      { type: string, maxLength: 80 }
          counterparty:     { type: string, maxLength: 200 }
          contract_type:    { type: string, maxLength: 120 }
          owner:            { type: string, maxLength: 120 }
          repository_url:   { type: string, maxLength: 512, pattern: "^https://" }
          effective_date:   { type: string, maxLength: 10, pattern: "^[0-9-]+$" }
          expiry_date:      { type: string, maxLength: 10, pattern: "^[0-9-]+$" }
          renewal_clause:   { type: string, maxLength: 1600 }
          notice_period:    { type: string, maxLength: 120 }
          annual_value:     { type: string, maxLength: 80 }
          notes:            { type: string, maxLength: 1000 }
