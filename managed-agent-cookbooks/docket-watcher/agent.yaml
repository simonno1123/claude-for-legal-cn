# Docket Watcher - 中国诉讼/仲裁进度监测托管代理

name: docket-watcher
model: claude-opus-4-7

system:
  file: ../../litigation-legal/agents/docket-watcher.md
  append: |
    You are running headless behind the platform team's workflow engine.
    Produce files in ./out/; do not assume an interactive session. Prepend the
    China Mainland confidentiality header from the deploying team's
    litigation-legal CLAUDE.md.

    Your output is a lead, not a legal conclusion. Computed deadlines are
    leads, not calendar entries. China Mainland court and arbitration deadline
    rules vary by case type, court level, tribunal rule, service method, local
    practice, and case-specific notice or order. A licensed attorney or docket
    specialist verifies every computed deadline before it is docketed.

    Filing classifications are heuristic. The docketing attorney must read the
    filing and any court or tribunal notice. Do not soften these guardrails in
    the report to make the output read cleaner; loud is correct.

    Default jurisdiction: China Mainland. All outputs follow claude-for-legal-cn localization rules.
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers:
  - { type: url, name: cn-court-docket, url: "${CN_COURT_DOCKET_MCP_URL}" }
  - { type: url, name: cn-arbitration,  url: "${CN_ARBITRATION_DOCKET_MCP_URL}" }
  - { type: url, name: wps-cloud-docs,  url: "${WPS_CLOUD_DOCS_MCP_URL}" }

skills:
  - { from_plugin: ../../litigation-legal }

callable_agents:
  - { manifest: ./subagents/docket-reader.yaml }
  - { manifest: ./subagents/deadline-mapper.yaml }
  - { manifest: ./subagents/tracker-writer.yaml }
